site_name: Innovation Lab

theme:
  name: material
  palette: 
    - scheme: default
      toggle:
        icon: material/toggle-switch 
        name: Switch to dark mode
    - scheme: slate 
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to light mode
  features:
    - navigation.tabs
    - toc.integrate
    - navigation.top

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - meta
  - pymdownx.betterem:
      smart_enable: all
  - toc:
      toc_depth: 2


nav:
  - Home: index.md
  - Readings:
    - readings/index.md
  - Blog:
    - blog/index.md
  - Life Style:
    - lifestyle/index.md